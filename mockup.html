<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FunDay 🎉</title>
<style>
  :root {
    --bg: #f6f7fb;
    --card: #ffffff;
    --ink: #1f2437;
    --muted: #6b7280;
    --brand: #5b5bd6;
    --brand-soft: #eef0ff;
    --ok: #16a34a;
    --ok-soft: #eafcf1;
    --warn: #d97706;
    --warn-soft: #fef4e6;
    --wa: #22b455;
    --radius: 14px;
    --shadow: 0 1px 3px rgba(30, 35, 60, .08), 0 8px 24px rgba(30, 35, 60, .06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", "Heebo", "Arial Hebrew", Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.55;
    padding-bottom: 60px;
  }
  header {
    background: linear-gradient(135deg, #5b5bd6 0%, #8b5bd6 60%, #d65bb8 100%);
    color: #fff;
    padding: 26px 20px 30px;
    text-align: center;
    position: relative;
  }
  header h1 { font-size: 2.1rem; letter-spacing: .5px; }
  header p { opacity: .92; margin-top: 6px; font-size: 1.02rem; }
  .region-switch {
    display: inline-flex; margin-bottom: 14px;
    background: rgba(255,255,255,.16); border-radius: 999px; padding: 4px;
  }
  .region-switch button {
    border: none; background: none; color: #fff; opacity: .75;
    font-size: .92rem; font-weight: 700; padding: 7px 18px; border-radius: 999px; cursor: pointer;
  }
  .region-switch button.active { background: #fff; color: var(--brand); opacity: 1; }
  main { max-width: 900px; margin: 20px auto 0; padding: 0 16px; }

  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px; }
  form.search-card { display: grid; grid-template-columns: repeat(4, 1fr) auto; gap: 14px; align-items: end; }
  @media (max-width: 760px) { form.search-card { grid-template-columns: 1fr 1fr; } form.search-card button { grid-column: 1 / -1; } }
  label { display: block; font-size: .85rem; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
  select, input {
    width: 100%; padding: 10px 12px; border: 1.5px solid #e3e5ee; border-radius: 10px;
    font-size: 1rem; background: #fbfbfe; color: var(--ink);
  }
  select:focus, input:focus { outline: none; border-color: var(--brand); background: #fff; }
  button.primary {
    background: var(--brand); color: #fff; border: none; padding: 11px 26px; border-radius: 10px;
    font-size: 1rem; font-weight: 700; cursor: pointer; white-space: nowrap; transition: filter .15s;
  }
  button.primary:hover { filter: brightness(1.08); }

  .section-title { display: flex; justify-content: space-between; align-items: baseline; margin: 30px 4px 12px; }
  .section-title h2 { font-size: 1.25rem; }
  .section-title .count { color: var(--muted); font-size: .9rem; }

  .results { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 700px) { .results { grid-template-columns: 1fr; } }

  .activity { display: flex; flex-direction: column; gap: 8px; }
  .activity .top { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
  .activity h3 { font-size: 1.08rem; }
  .activity .city { color: var(--muted); font-size: .88rem; }
  .stars { color: #f59e0b; font-size: .88rem; font-weight: 700; }
  .badge { font-size: .78rem; font-weight: 700; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
  .badge.ok   { background: var(--ok-soft);   color: var(--ok); }
  .badge.over { background: var(--warn-soft); color: var(--warn); }
  .activity .desc { color: #3f4457; font-size: .93rem; }
  .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 2px; }
  .chip { background: var(--brand-soft); color: var(--brand); font-size: .8rem; font-weight: 600; padding: 3px 10px; border-radius: 999px; }
  .total { font-weight: 800; font-size: 1.02rem; margin-top: 2px; }
  .actions { display: flex; gap: 10px; margin-top: 8px; }
  .actions button {
    flex: 1; text-align: center; font-size: .88rem; font-weight: 700; padding: 8px 0;
    border-radius: 9px; cursor: pointer; border: 1.5px solid #e3e5ee; background: #fff; color: var(--ink);
  }
  .actions button.details { border-color: var(--brand); color: var(--brand); }
  .actions button.details:hover { background: var(--brand-soft); }
  .actions button.save.saved { background: var(--brand); color: #fff; border-color: var(--brand); }

  .empty { text-align: center; color: var(--muted); padding: 40px 20px; background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); }
  .saved-list { display: flex; flex-direction: column; gap: 10px; }
  .saved-item {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    background: var(--card); border-radius: 12px; box-shadow: var(--shadow); padding: 12px 16px; font-size: .95rem;
  }
  .saved-item .ctx { color: var(--muted); font-size: .82rem; }
  .saved-item button { border: none; background: none; color: #c2410c; font-weight: 700; cursor: pointer; }

  /* detail modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(20, 23, 40, .45);
    display: none; align-items: center; justify-content: center; padding: 18px; z-index: 50;
  }
  .overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 18px; max-width: 560px; width: 100%;
    max-height: 88vh; overflow-y: auto; padding: 26px; position: relative;
    box-shadow: 0 20px 60px rgba(20, 23, 40, .3);
  }
  .modal .close { position: absolute; top: 14px; inset-inline-end: 16px; border: none; background: #f1f2f8; border-radius: 999px; width: 32px; height: 32px; font-size: 1rem; cursor: pointer; color: var(--muted); }
  .modal h3 { font-size: 1.35rem; margin-bottom: 2px; }
  .modal .sub { color: var(--muted); font-size: .9rem; margin-bottom: 12px; }
  .modal .desc { margin: 10px 0 14px; color: #3f4457; }
  .modal .info-row { display: flex; justify-content: space-between; padding: 9px 0; border-top: 1px solid #eef0f6; font-size: .93rem; }
  .modal .info-row .k { color: var(--muted); }
  .modal .links { display: flex; gap: 10px; margin: 14px 0 6px; }
  .modal .links a { flex: 1; text-align: center; font-size: .88rem; font-weight: 700; padding: 9px 0; border-radius: 9px; text-decoration: none; border: 1.5px solid #e3e5ee; color: var(--ink); }
  .cta { display: flex; gap: 10px; margin-top: 12px; }
  .cta a {
    flex: 1; text-align: center; text-decoration: none; color: #fff; font-weight: 800;
    padding: 12px 0; border-radius: 11px; font-size: .95rem;
  }
  .cta a.wa { background: var(--wa); }
  .cta a.mail { background: var(--brand); }
  .cta-note { text-align: center; color: var(--muted); font-size: .78rem; margin-top: 8px; }

  .mock-note { max-width: 900px; margin: 26px auto 0; padding: 0 16px; color: var(--muted); font-size: .82rem; text-align: center; }
  @media print {
    header, form.search-card, .actions, .mock-note, #resultsSection, .overlay { display: none !important; }
    body { background: #fff; }
  }
</style>
</head>
<body>

<header>
  <div class="region-switch" id="regionSwitch">
    <button data-region="il">🇮🇱 ישראל</button>
    <button data-region="dallas">🇺🇸 Dallas</button>
  </div>
  <h1>FunDay 🎉</h1>
  <p id="tagline"></p>
</header>

<main>
  <form class="search-card card" id="searchForm">
    <div>
      <label for="category" data-i18n="category"></label>
      <select id="category"></select>
    </div>
    <div>
      <label for="city" data-i18n="city"></label>
      <select id="city"></select>
    </div>
    <div>
      <label for="budget" data-i18n="budget"></label>
      <input type="number" id="budget" min="0" step="100">
    </div>
    <div>
      <label for="group" data-i18n="group"></label>
      <input type="number" id="group" min="1" step="1">
    </div>
    <button class="primary" type="submit" data-i18n="search"></button>
  </form>

  <div id="resultsSection">
    <div class="section-title">
      <h2 data-i18n="results"></h2>
      <span class="count" id="resultCount"></span>
    </div>
    <div class="results" id="results"></div>
  </div>

  <div id="savedSection" style="display:none">
    <div class="section-title">
      <h2 data-i18n="myPlans"></h2>
      <span class="count"><button style="border:none;background:none;color:var(--brand);font-weight:700;cursor:pointer" onclick="window.print()" data-i18n="print"></button></span>
    </div>
    <div class="saved-list" id="savedList"></div>
  </div>
</main>

<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<p class="mock-note" data-i18n="mockNote"></p>

<script>

    provider: "ספק", ratingLbl: "דירוג", priceLbl: "מחיר", groupRange: "גודל קבוצה",

  { id:"workshop-tlv-05", region:"il", name:"סדנת גרפיטי בפלורנטין", category:"workshop", city:"תל אביב", price_per_person:95, group_min:8, group_max:30, rating:4.5, description:"סיור אמנות רחוב וסדנת ריסוס שבסופה כל צוות יוצר קיר משלו.", link:"#", reviews_link:"#", provider:{ name:"גרפיטיולוגיה", phone:"972501234505", email:"hi@graffiti.example" } },

/* ---------- state ---------- */
let region = localStorage.getItem("funday_region") || "il";
let T = I18N[REGION_LANG[region]];

const $ = id => document.getElementById(id);
const fmt = n => T.currency + n.toLocaleString(T.locale);
const catName = c => (CATEGORY_NAMES[c] || {})[T.lang] || c;
const regionData = () => ACTIVITIES.filter(a => a.region === region);

function applyLocale() {
  T = I18N[REGION_LANG[region]];
  document.documentElement.lang = T.lang;
  document.documentElement.dir = T.dir;
  document.querySelectorAll("[data-i18n]").forEach(el => { el.innerHTML = T[el.dataset.i18n]; });
  $("tagline").textContent = T.tagline;
  $("budget").placeholder = T.budgetPh;
  $("group").placeholder = T.groupPh;
  document.querySelectorAll("#regionSwitch button").forEach(b => b.classList.toggle("active", b.dataset.region === region));
  const data = regionData();
  $("category").innerHTML = `<option value="">${T.all}</option>` +
    [...new Set(data.map(a => a.category))].map(c => `<option value="${c}">${catName(c)}</option>`).join("");
  $("city").innerHTML = `<option value="">${T.all}</option>` +
    [...new Set(data.map(a => a.city))].map(c => `<option value="${c}">${c}</option>`).join("");
}

document.querySelectorAll("#regionSwitch button").forEach(b => b.onclick = () => {
  region = b.dataset.region;
  localStorage.setItem("funday_region", region);
  $("budget").value = ""; $("group").value = "";
  applyLocale(); renderSaved(); search();
});

/* ---------- saved plans ---------- */
function getSaved() { try { return JSON.parse(localStorage.getItem("funday_saved_v2") || "[]"); } catch { return []; } }
function setSaved(v) { localStorage.setItem("funday_saved_v2", JSON.stringify(v)); renderSaved(); }

/* ---------- search ---------- */
function stars(r) { return r ? `<span class="stars">★ ${r.toFixed(1)}</span>` : ""; }

function search() {
  const cat = $("category").value, city = $("city").value;
  const budget = parseInt($("budget").value) || 0;
  const group = parseInt($("group").value) || 0;

  let list = regionData().filter(a =>
    (!cat || a.category === cat) &&
    (!city || a.city === city) &&
    (!group || (group >= a.group_min && group <= a.group_max))
  ).map(a => {
    const total = group ? a.price_per_person * group : null;
    const over = (budget && total) ? Math.max(0, total - budget) : 0;
    return { ...a, total, over, inBudget: !budget || !total || total <= budget };
  });

  list.sort((x, y) => (x.inBudget === y.inBudget)
    ? (x.total ?? x.price_per_person) - (y.total ?? y.price_per_person)
    : (x.inBudget ? -1 : 1));

  const saved = new Set(getSaved().map(s => s.id));
  $("resultCount").textContent = list.length ? T.found(list.length) : "";
  $("results").innerHTML = list.length ? list.map(a => `
    <div class="card activity">
      <div class="top">
        <div>
          <h3>${a.name}</h3>
          <div class="city">📍 ${a.city} &nbsp;${stars(a.rating)}</div>
        </div>
        ${a.total !== null && budget ? (a.inBudget
          ? `<span class="badge ok">${T.inBudget}</span>`
          : `<span class="badge over">${T.overBy(fmt(a.over))}</span>`) : ""}
      </div>
      <div class="desc">${a.description}</div>
      <div class="meta">
        <span class="chip">${catName(a.category)}</span>
        <span class="chip">${fmt(a.price_per_person)} ${T.perPerson}</span>
        <span class="chip">${a.group_min}–${a.group_max} ${T.participants}</span>
      </div>
      ${a.total !== null ? `<div class="total">${T.groupTotal}: ${fmt(a.total)}</div>` : ""}
      <div class="actions">
        <button class="details" data-id="${a.id}">${T.details}</button>
        <button class="save ${saved.has(a.id) ? "saved" : ""}" data-id="${a.id}">${saved.has(a.id) ? T.saved : T.save}</button>
      </div>
    </div>`).join("")
    : `<div class="empty" style="grid-column:1/-1">${T.noResults}</div>`;

  document.querySelectorAll(".save").forEach(b => b.onclick = () => toggleSave(b.dataset.id));
  document.querySelectorAll(".details").forEach(b => b.onclick = () => openModal(b.dataset.id));
}

function toggleSave(id) {
  const a = ACTIVITIES.find(x => x.id === id);
  let saved = getSaved();
  if (saved.some(s => s.id === id)) saved = saved.filter(s => s.id !== id);
  else saved.push({ id, region: a.region, name: a.name, city: a.city, group: $("group").value, budget: $("budget").value, price: a.price_per_person });
  setSaved(saved);
  search();
}

function renderSaved() {
  const saved = getSaved().filter(s => s.region === region);
  $("savedSection").style.display = saved.length ? "" : "none";
  $("savedList").innerHTML = saved.map(s => `
    <div class="saved-item">
      <div>
        <strong>${s.name}</strong> — ${s.city}
        <div class="ctx">${s.group ? T.groupOf(s.group) + " · " : ""}${s.budget ? T.budgetCtx(fmt(+s.budget)) + " · " : ""}${fmt(s.price)} ${T.perPerson}</div>
      </div>
      <button onclick='removeSaved("${s.id}")'>${T.remove}</button>
    </div>`).join("");
}
function removeSaved(id) { setSaved(getSaved().filter(s => s.id !== id)); search(); }

/* ---------- detail modal ---------- */
function openModal(id) {
  const a = ACTIVITIES.find(x => x.id === id);
  const group = parseInt($("group").value) || 0;
  const budget = parseInt($("budget").value) || 0;
  const waText = encodeURIComponent(T.waMsg(a, group, budget));
  const mailSubj = encodeURIComponent(T.mailSubject(a));
  const mailBody = encodeURIComponent(T.waMsg(a, group, budget));

  $("modal").innerHTML = `
    <button class="close" onclick="closeModal()">✕</button>
    <h3>${a.name}</h3>
    <div class="sub">📍 ${a.city} &nbsp;·&nbsp; ${catName(a.category)} &nbsp;·&nbsp; ${stars(a.rating)}</div>
    <div class="desc">${a.description}</div>
    <div class="info-row"><span class="k">${T.provider}</span><strong>${a.provider.name}</strong></div>
    <div class="info-row"><span class="k">${T.priceLbl}</span><strong>${fmt(a.price_per_person)} ${T.perPerson}</strong></div>
    <div class="info-row"><span class="k">${T.groupRange}</span><strong>${a.group_min}–${a.group_max} ${T.participants}</strong></div>
    ${group ? `<div class="info-row"><span class="k">${T.groupTotal}</span><strong>${fmt(a.price_per_person * group)}</strong></div>` : ""}
    <div class="links">
      <a href="${a.link}" target="_blank">${T.website}</a>
      <a href="${a.reviews_link}" target="_blank">${T.reviews}</a>
    </div>
    <div class="cta">
      ${a.provider.phone ? `<a class="wa" href="https://wa.me/${a.provider.phone}?text=${waText}" target="_blank">${T.bookWa}</a>` : ""}
      ${a.provider.email ? `<a class="mail" href="mailto:${a.provider.email}?subject=${mailSubj}&body=${mailBody}">${T.bookMail}</a>` : ""}
    </div>
    <div class="cta-note">${T.ctaNote}</div>`;
  $("overlay").classList.add("open");
}
function closeModal() { $("overlay").classList.remove("open"); }
$("overlay").onclick = e => { if (e.target === $("overlay")) closeModal(); };

/* ---------- init ---------- */
$("searchForm").onsubmit = e => { e.preventDefault(); search(); };
applyLocale();
renderSaved();
search();
</script>
</body>
</html>
