<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FunDay 🎉 · Conifers</title>
<link rel="icon" type="image/png" href="assets/conifers-fav32.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <img class="company-logo" src="assets/conifers-logo.png" alt="Conifers">
  <div class="region-switch" id="regionSwitch">
    <button data-region="il">🇮🇱 ישראל</button>
    <button data-region="dallas">🇺🇸 Dallas</button>
  </div>
  <h1>FunDay 🎉</h1>
  <p id="tagline"></p>
</header>

<main>
  <form class="search-card card" id="searchForm">
    <div>
      <label for="category" data-i18n="category"></label>
      <select id="category"></select>
    </div>
    <div>
      <label for="city" data-i18n="city"></label>
      <select id="city"></select>
    </div>
    <div>
      <label for="budget" data-i18n="budget"></label>
      <input type="number" id="budget" min="0" step="100">
    </div>
    <div>
      <label for="group" data-i18n="group"></label>
      <input type="number" id="group" min="1" step="1">
    </div>
    <button class="primary" type="submit" data-i18n="search"></button>
  </form>

  <div class="load-error" id="loadError" style="display:none">
    <div id="loadErrorMsg"></div>
    <button class="primary" id="retryBtn"></button>
  </div>

  <div id="resultsSection">
    <div class="section-title">
      <h2 data-i18n="results"></h2>
      <span class="count" id="resultCount"></span>
    </div>
    <div class="results" id="results"></div>
  </div>

  <div id="savedSection" style="display:none">
    <div class="section-title">
      <h2 data-i18n="myPlans"></h2>
      <span class="count"><button style="border:none;background:none;color:var(--brand);font-weight:700;cursor:pointer" onclick="window.print()" data-i18n="print"></button></span>
    </div>
    <div class="saved-list" id="savedList"></div>
  </div>
</main>

<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<p class="mock-note" id="footerNote"></p>

<script type="module" src="js/app.js"></script>
</body>
</html>
