<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FunDay · Admin</title>
<link rel="icon" type="image/png" href="assets/conifers-fav32.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <img class="company-logo" src="assets/conifers-logo.png" alt="Conifers">
  <h1>FunDay · Catalog Admin</h1>
  <p>Draft new activities, validate them, download the updated activities.json and commit it to the repo</p>
</header>

<main>
  <div class="card">
    <div class="admin-form" id="form">
      <div>
        <label for="id">id (unique, kebab-case)</label>
        <input id="id" placeholder="escape-tlv-02">
      </div>
      <div>
        <label for="region">region</label>
        <select id="region">
          <option value="il">il (Israel, ₪)</option>
          <option value="dallas">dallas (USD)</option>
        </select>
      </div>
      <div>
        <label for="name">name</label>
        <input id="name">
      </div>
      <div>
        <label for="category">category</label>
        <select id="category"></select>
      </div>
      <div>
        <label for="city">city / area</label>
        <input id="city">
      </div>
      <div>
        <label for="price_per_person">price per person (integer)</label>
        <input id="price_per_person" type="number" min="1" step="1">
      </div>
      <div>
        <label for="group_min">group min</label>
        <input id="group_min" type="number" min="1" step="1">
      </div>
      <div>
        <label for="group_max">group max</label>
        <input id="group_max" type="number" min="1" step="1">
      </div>
      <div>
        <label for="rating">rating (1–5, optional)</label>
        <input id="rating" type="number" min="1" max="5" step="0.1">
      </div>
      <div>
        <label for="link">activity website (optional)</label>
        <input id="link" placeholder="https://...">
      </div>
      <div>
        <label for="reviews_link">reviews link (optional)</label>
        <input id="reviews_link" placeholder="https://maps.google.com/...">
      </div>
      <div>
        <label for="provider_name">provider name</label>
        <input id="provider_name">
      </div>
      <div>
        <label for="provider_phone">provider phone (digits only, E.164 no +, optional)</label>
        <input id="provider_phone" placeholder="972501234567">
      </div>
      <div>
        <label for="provider_email">provider email (optional)</label>
        <input id="provider_email" placeholder="book@provider.com">
      </div>
      <div class="full">
        <label for="description">description</label>
        <textarea id="description" rows="3"></textarea>
      </div>
    </div>

    <div class="admin-errors" id="adminErrors" style="display:none"></div>

    <div class="admin-bar">
      <button class="primary" id="addBtn">Add activity</button>
      <span class="count" id="draftCount"></span>
      <button class="primary" id="downloadBtn">Download updated activities.json</button>
    </div>

    <textarea class="admin-json" id="jsonPreview" readonly></textarea>
  </div>
</main>

<p class="mock-note">The repo is the database: commit the downloaded file as data/activities.json — CI validates it on every push.</p>

<script type="module" src="js/admin.js"></script>
</body>
</html>
